<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rhode Island Legislative Election Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    header {
      padding: 14px 18px;
      background: #111827;
      color: white;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
    }
    header p {
      margin: 4px 0 0 0;
      font-size: 13px;
      color: #d1d5db;
    }
    #controls {
      padding: 12px 18px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    select {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      background: white;
    }
    #overview {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 14px 18px;
    }
    .overview-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .overview-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .overview-label {
      color: #6b7280;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .overview-value {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      line-height: 1.25;
    }
    .overview-detail {
      color: #4b5563;
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.35;
    }
    #map {
      height: calc(100vh - 300px);
      min-height: 420px;
      width: 100%;
    }
    .legend {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.25);
      line-height: 1.5;
      font-size: 13px;
    }
    .swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: -2px;
      border: 1px solid #999;
    }
    .popup-title {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .fact-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 3px 12px;
      margin: 6px 0 8px;
      font-size: 13px;
    }
    .candidate-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    .candidate-table th, .candidate-table td {
      border-bottom: 1px solid #ddd;
      padding: 4px;
      text-align: left;
    }
    .note {
      font-size: 12px;
      color: #555;
      padding: 8px 18px;
      background: #fff7ed;
      border-bottom: 1px solid #fed7aa;
    }
    .era-badge {
      margin-left: 8px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
    }
  </style>
</head>
<body>
<header>
  <h1>Rhode Island Legislative Election Map</h1>
  <p>Interactive map with RI GIS coastline-clipped 2012–2020 boundaries and 2022–2024 boundaries.</p>
</header>

<div id="controls">
  <label>Chamber:
    <select id="chamberSelect">
      <option value="senate">Senate</option>
      <option value="house">House</option>
    </select>
  </label>
  <label>Year:
    <select id="yearSelect">
      <option value="2024">2024</option>
      <option value="2022">2022</option>
      <option value="2020">2020</option>
      <option value="2018">2018</option>
      <option value="2016">2016</option>
      <option value="2014">2014</option>
      <option value="2012">2012</option>
    </select>
  </label>
  <label>View:
    <select id="viewSelect">
      <option value="party">Winner Party</option>
      <option value="uncontested">Uncontested Seats</option>
    </select>
  </label>
  <span id="eraBadge" class="era-badge"></span>
</div>

<div class="note">
  Hover over a district for a quick label. Click a district for candidates, votes, parties, percentages, total votes, margin, and uncontested status.
</div>

<section id="overview">
  <div class="overview-title" id="overviewTitle">Election Overview</div>
  <div class="overview-grid" id="overviewGrid"></div>
</section>

<div id="map"></div>

<script>
let geojsons = {};
let raceData = {};

async function loadData() {
  const files = {
    senate_old: "data/senate_old.geojson",
    house_old: "data/house_old.geojson",
    senate_new: "data/senate_new.geojson",
    house_new: "data/house_new.geojson"
  };

  const geoEntries = await Promise.all(
    Object.entries(files).map(async ([key, url]) => [key, await fetch(url).then(r => r.json())])
  );

  geojsons = Object.fromEntries(geoEntries);
  raceData = await fetch("data/race_data.json").then(r => r.json());
}

const partyColors = {
  "DEM": "#1f77b4",
  "REP": "#d62728",
  "IND": "#7f7f7f",
  "LIB": "#f59e0b",
  "MOD": "#8b5cf6",
  "NON": "#9ca3af",
  "OTHER": "#d9d9d9"
};

const map = L.map('map').setView([41.70, -71.55], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let layer = null;
let legend = null;

function getEra(year) {
  return Number(year) <= 2020 ? "old" : "new";
}

function getGeoKey(chamber, year) {
  const era = getEra(year);
  return `${chamber}_${era}`;
}

function getRace(chamber, year, district) {
  return raceData[`${chamber}|${year}|${district}`];
}

function styleFeature(feature) {
  const chamber = document.getElementById('chamberSelect').value;
  const year = document.getElementById('yearSelect').value;
  const view = document.getElementById('viewSelect').value;
  const district = feature.properties.district_number;
  const race = getRace(chamber, year, district);

  let fill = "#eeeeee";
  if (race) {
    if (view === "party") {
      fill = partyColors[race.winner_party] || partyColors.OTHER;
    } else if (view === "uncontested") {
      fill = race.is_uncontested ? (partyColors[race.winner_party] || partyColors.OTHER) : "#d9d9d9";
    }
  }

  return {
    color: "#222",
    weight: 0.6,
    opacity: 1,
    fillColor: fill,
    fillOpacity: 0.82
  };
}

function popupHtml(race, district, chamber, year) {
  if (!race) {
    return `<div class="popup-title">${chamber} District ${district}</div><p>No race data available for ${year}.</p>`;
  }

  let candidateRows = race.candidates.map(c => `
    <tr>
      <td>${c.role}</td>
      <td>${c.name}</td>
      <td>${c.party}</td>
      <td>${c.votes}</td>
      <td>${c.pct}</td>
    </tr>
  `).join("");

  return `
    <div class="popup-title">${race.chamber} District ${race.district_number} — ${race.year}</div>
    <div><strong>${race.contest}</strong></div>
    <div class="fact-grid">
      <div>Winner</div><div>${race.winner_candidate} (${race.winner_party})</div>
      <div>Total votes</div><div>${race.district_total_votes}</div>
      <div>Margin</div><div>${race.margin_votes} (${race.margin_pct})</div>
      <div>Uncontested</div><div>${race.is_uncontested ? "Yes" : "No"}</div>
    </div>
    <table class="candidate-table">
      <thead><tr><th>Role</th><th>Candidate</th><th>Party</th><th>Votes</th><th>%</th></tr></thead>
      <tbody>${candidateRows}</tbody>
    </table>
  `;
}

function onEachFeature(feature, lyr) {
  const chamber = document.getElementById('chamberSelect').value;
  const year = document.getElementById('yearSelect').value;
  const district = feature.properties.district_number;
  const race = getRace(chamber, year, district);

  const tooltip = race
    ? `${race.chamber} District ${district} — ${race.winner_party}`
    : `${chamber} District ${district}`;

  lyr.bindTooltip(tooltip, {sticky: true});
  lyr.bindPopup(popupHtml(race, district, chamber, year), {maxWidth: 460});

  lyr.on({
    mouseover: function(e) {
      e.target.setStyle({weight: 2.5, color: "#000"});
      e.target.bringToFront();
    },
    mouseout: function(e) {
      layer.resetStyle(e.target);
    }
  });
}

function addLegend() {
  if (legend) map.removeControl(legend);

  const view = document.getElementById('viewSelect').value;
  legend = L.control({position: 'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    if (view === "party") {
      div.innerHTML = `
        <strong>Winner Party</strong><br>
        <span class="swatch" style="background:${partyColors.DEM}"></span> Democratic<br>
        <span class="swatch" style="background:${partyColors.REP}"></span> Republican<br>
        <span class="swatch" style="background:${partyColors.IND}"></span> Independent/Other
      `;
    } else if (view === "uncontested") {
      div.innerHTML = `
        <strong>Uncontested Seats</strong><br>
        <span class="swatch" style="background:${partyColors.DEM}"></span> Uncontested Democratic<br>
        <span class="swatch" style="background:${partyColors.REP}"></span> Uncontested Republican<br>
        <span class="swatch" style="background:#d9d9d9"></span> Contested
      `;
    }
    return div;
  };
  legend.addTo(map);
}

function updateEraBadge() {
  const year = document.getElementById('yearSelect').value;
  const badge = document.getElementById('eraBadge');
  if (Number(year) <= 2020) {
    badge.textContent = "Using RI GIS clipped 2012–2020 districts";
  } else {
    badge.textContent = "Using 2022–2024 districts";
  }
}


function parseNumber(value) {
  if (value === null || value === undefined || value === "") return NaN;
  if (typeof value === "number") return value;
  return Number(String(value).replace(/,/g, "").replace(/%/g, ""));
}

function racesForSelection(chamber, year) {
  const prefix = `${chamber}|${year}|`;
  return Object.entries(raceData)
    .filter(([key, race]) => key.startsWith(prefix))
    .map(([key, race]) => race)
    .sort((a, b) => Number(a.district_number) - Number(b.district_number));
}

function partyLabel(code) {
  if (code === "DEM") return "Democratic";
  if (code === "REP") return "Republican";
  if (code === "IND") return "Independent";
  if (code === "LIB") return "Libertarian";
  if (code === "MOD") return "Moderate";
  return code || "Other";
}

function formatDistrictLabel(race) {
  if (!race) return "N/A";
  return `${race.chamber} District ${race.district_number}`;
}

function updateOverview() {
  const chamber = document.getElementById('chamberSelect').value;
  const year = document.getElementById('yearSelect').value;
  const races = racesForSelection(chamber, year);
  const titleChamber = chamber === "house" ? "House" : "Senate";

  document.getElementById("overviewTitle").textContent = `${year} Rhode Island ${titleChamber} Overview`;

  if (!races.length) {
    document.getElementById("overviewGrid").innerHTML = `
      <div class="overview-card">
        <div class="overview-label">Status</div>
        <div class="overview-value">No data</div>
        <div class="overview-detail">No race records found for this selection.</div>
      </div>
    `;
    return;
  }

  const partyCounts = {};
  races.forEach(r => {
    const p = r.winner_party || "OTHER";
    partyCounts[p] = (partyCounts[p] || 0) + 1;
  });

  const partySummary = Object.entries(partyCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([party, count]) => `${count} ${partyLabel(party)}`)
    .join(" · ");

  const uncontested = races.filter(r => r.is_uncontested);
  const contested = races.filter(r => !r.is_uncontested);

  const closest = contested
    .map(r => ({race: r, margin: Math.abs(parseNumber(r.margin_votes))}))
    .filter(x => !Number.isNaN(x.margin))
    .sort((a, b) => a.margin - b.margin)[0];

  const largest = races
    .map(r => ({race: r, margin: Math.abs(parseNumber(r.margin_votes))}))
    .filter(x => !Number.isNaN(x.margin))
    .sort((a, b) => b.margin - a.margin)[0];

  const avgMarginPct = contested
    .map(r => Math.abs(parseNumber(r.margin_pct)))
    .filter(x => !Number.isNaN(x));
  const avgMargin = avgMarginPct.length
    ? (avgMarginPct.reduce((a, b) => a + b, 0) / avgMarginPct.length).toFixed(1) + "%"
    : "N/A";

  const totalVotes = races
    .map(r => parseNumber(r.district_total_votes))
    .filter(x => !Number.isNaN(x))
    .reduce((a, b) => a + b, 0);

  const grid = document.getElementById("overviewGrid");
  grid.innerHTML = `
    <div class="overview-card">
      <div class="overview-label">Total seats</div>
      <div class="overview-value">${races.length}</div>
      <div class="overview-detail">${partySummary}</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">Uncontested seats</div>
      <div class="overview-value">${uncontested.length}</div>
      <div class="overview-detail">${((uncontested.length / races.length) * 100).toFixed(1)}% of seats</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">Closest race</div>
      <div class="overview-value">${closest ? formatDistrictLabel(closest.race) : "N/A"}</div>
      <div class="overview-detail">${closest ? `${closest.race.winner_candidate} won by ${closest.race.margin_votes} votes (${closest.race.margin_pct})` : "No contested races"}</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">Largest win</div>
      <div class="overview-value">${largest ? formatDistrictLabel(largest.race) : "N/A"}</div>
      <div class="overview-detail">${largest ? `${largest.race.winner_candidate} won by ${largest.race.margin_votes} votes (${largest.race.margin_pct})` : "N/A"}</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">Average margin</div>
      <div class="overview-value">${avgMargin}</div>
      <div class="overview-detail">Average among contested races</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">Total votes</div>
      <div class="overview-value">${totalVotes.toLocaleString()}</div>
      <div class="overview-detail">Sum of district-level votes</div>
    </div>
  `;
}

function refreshMap() {
  const chamber = document.getElementById('chamberSelect').value;
  const year = document.getElementById('yearSelect').value;
  const geo = geojsons[getGeoKey(chamber, year)];

  if (layer) map.removeLayer(layer);

  layer = L.geoJSON(geo, {
    style: styleFeature,
    onEachFeature: onEachFeature
  }).addTo(map);

  map.fitBounds(layer.getBounds(), {padding: [15, 15]});
  addLegend();
  updateEraBadge();
  updateOverview();
}

document.getElementById('chamberSelect').addEventListener('change', refreshMap);
document.getElementById('yearSelect').addEventListener('change', refreshMap);
document.getElementById('viewSelect').addEventListener('change', refreshMap);

loadData().then(refreshMap);
</script>
</body>
</html>
